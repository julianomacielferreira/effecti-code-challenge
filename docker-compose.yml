version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: effecti_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: effecti_erp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: effecti
      MYSQL_PASSWORD: z0x9c8v7
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # - ./docker/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - effecti_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: effecti_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    # Espera o MySQL, roda migrate, depois sobe o php-fpm
    command: >
      sh -c "sleep 12 &&
             php artisan migrate --force &&
             php artisan l5-swagger:generate &&
             php-fpm -F"
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=effecti_erp
      - DB_USERNAME=effecti
      - DB_PASSWORD=z0x9c8v7
    networks:
      - effecti_network

  nginx:
    image: nginx:alpine
    container_name: effecti_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - effecti_network

  frontend:
    image: node:18-alpine
    container_name: effecti_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    networks:
      - effecti_network

networks:
  effecti_network:
    driver: bridge

volumes:
  mysql_data:
